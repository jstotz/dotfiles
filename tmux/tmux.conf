# Plugins (TPM list — declare before init at bottom)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin options
set -g @catppuccin_window_tabs_enabled on
set -g @tmux-autoreload-configs "$DOTFILES/tmux/tmux.conf"
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# tmux-fzf
TMUX_FZF_ORDER="session|window|pane|command|keybinding"
TMUX_FZF_OPTIONS="-p -w 90% -h 70% -m"

# Core options
set -g mouse on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -sg terminal-overrides ",*:RGB"

# Pass through extended modifier keys (Shift+Enter, Ctrl+Shift+*, etc.) so
# apps like Claude Code receive them via CSI u sequences.
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'
set-option -g set-titles on
set-option -g set-titles-string "#S: #W [#I]#{?#{==:#{host},#T},, - #T} #{session_alerts}"
set-option -g status-position top

# Prefix
unbind-key C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Window management
bind-key -N "Open a new window" c new-window -c "#{pane_current_path}"
bind-key -N "Kill the current pane" x kill-pane
bind-key X send-keys -R \; send-keys C-l \; clear-history

# Splits
bind-key -N "Split to the right of the current pane" "|" split-window -h -c "#{pane_current_path}"
bind-key -N "Split to the right of the current pane (full width)" "\\" split-window -fh -c "#{pane_current_path}"
bind-key -N "Split below the current pane" "-" split-window -v -c "#{pane_current_path}"
bind-key -N "Split below the current pane (full width)" "_" split-window -fv -c "#{pane_current_path}"

# Pane resize (no prefix, repeatable)
bind-key -N "Resize pane left"  -n M-h resize-pane -L
bind-key -N "Resize pane right" -n M-l resize-pane -R
bind-key -N "Resize pane up"    -n M-k resize-pane -U
bind-key -N "Resize pane down"  -n M-j resize-pane -D

# Swap windows (no prefix)
bind-key -N "Move current window left"  -n M-i swap-window -d -t -1
bind-key -N "Move current window right" -n M-o swap-window -d -t +1

# Detach
bind-key -N "Detach the current client" -n M-d detach-client

# Popups
bind-key -N "Display lazygit popup" g display-popup -E -d "#{pane_current_path}" -h 95% -w 95% "lazygit"
bind-key -N "Open current directory in Zed" O run-shell "zed '#{pane_current_path}'"
bind-key -N "Display scratchpad terminal popup" -n M-g display-popup -E -h 80% -w 80% "tmux new-session -A -s scratch"
bind-key -N "Display key bindings" ? display-popup -E "tmux list-keys -N | fzf --reverse"

# sesh — session/project picker
bind-key -N "Connect via sesh" C-t run-shell "sesh connect \"\$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# workmux
bind-key -N "Display workmux dashboard" C-s display-popup -h 90% -w 90% -E "workmux dashboard"
bind-key -N "Display workmux dashboard (worktrees tab)" C-w display-popup -h 90% -w 90% -E "workmux dashboard --tab worktrees"
bind-key -N "Toggle workmux sidebar" b run-shell "workmux sidebar"
bind-key -N "Jump to last-done workmux agent" L run-shell "workmux last-done"
bind-key -N "Toggle between recent workmux agents" Tab run-shell "workmux last-agent"

# Copy mode (vi-style)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key P paste-buffer

# Plugin init (must be after binding declarations)
run '~/.config/tmux/plugins/tpm/tpm'

# Theme overrides (after plugin init)
set -g status-bg "#181825"
set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[1]' '#[fill=#1e1e2e]'
set -g status 2
